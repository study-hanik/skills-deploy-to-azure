name: Step 2, Azure 환경 설정하기

# 이 워크플로우는 step 2에서 step 3으로 업데이트합니다.

# staging-workflow 브랜치의 deploy-staging.yml 파일에 푸시할 때마다 실행됩니다
# 참고: https://docs.github.com/en/actions/learn-github-actions/events-that-trigger-workflows
on:
  workflow_dispatch:
  push:
    branches:
      - staging-workflow
    paths:
      - .github/workflows/deploy-staging.yml

permissions:
  # Need `contents: read` to checkout the repository.
  # Need `contents: write` to update the step metadata.
  contents: write
  pull-requests: write

jobs:
  # Get the current step to only run the main job when the learner is on the same step.
  get_current_step:
    name: Check current step number
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - id: get_step
        run: |
          echo "current_step=$(cat ./.github/steps/-step.txt)" >> $GITHUB_OUTPUT
    outputs:
      current_step: ${{ steps.get_step.outputs.current_step }}

  on_staging_workflow_update:
    name: 스테이징 워크플로우 업데이트 확인
    needs: get_current_step

    # We will only run this action when:
    # 1. This repository isn't the template repository.
    # 2. The step is currently 2.
    # Reference: https://docs.github.com/en/actions/learn-github-actions/contexts
    # Reference: https://docs.github.com/en/actions/learn-github-actions/expressions
    if: >-
      ${{ !github.event.repository.is_template
          && needs.get_current_step.outputs.current_step == 2 }}

    # We'll run Ubuntu for performance instead of Mac or Windows.
    runs-on: ubuntu-latest

    steps:
      # We'll need to check out the repository so that we can edit the README.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Let's get all the branches.

      # 학습자가 Build-Docker-Image 작업을 구성했는지 확인합니다.
      - name: Build-Docker-Image 작업 확인
        uses: skills/action-check-file@v1
        with:
          file: .github/workflows/deploy-staging.yml
          search: "Build-Docker-Image"

      - name: Build-Docker-Image 작업 확인
        uses: skills/action-check-file@v1
        with:
          file: .github/workflows/deploy-staging.yml
          search: "actions/download-artifact"

      - name: Build-Docker-Image 작업 확인
        uses: skills/action-check-file@v1
        with:
          file: .github/workflows/deploy-staging.yml
          search: "docker/login-action"

      - name: Build-Docker-Image 작업 확인
        uses: skills/action-check-file@v1
        with:
          file: .github/workflows/deploy-staging.yml
          search: "docker/build-push-action"

      # 학습자가 Deploy-to-Azure 작업을 구성했는지 확인합니다.
      - name: Deploy-to-Azure 작업 확인
        uses: skills/action-check-file@v1
        with:
          file: .github/workflows/deploy-staging.yml
          search: "Deploy-to-Azure"

      - name: Deploy-to-Azure 작업 확인
        uses: skills/action-check-file@v1
        with:
          file: .github/workflows/deploy-staging.yml
          search: "azure/login"

      - name: Deploy-to-Azure 작업 확인
        uses: skills/action-check-file@v1
        with:
          file: .github/workflows/deploy-staging.yml
          search: "azure/webapps-deploy"

      # 열린 풀 리퀘스트를 병합합니다.
      - name: 풀 리퀘스트 병합
        run: gh pr merge --squash staging-workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # main을 풀합니다.
      - name: main 풀
        run: |
          chmod +x ./.github/script/initialize-repository.sh
          ./.github/script/initialize-repository.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # README.md에서 step 2를 step 3으로 전환합니다.
      - name: step 3으로 업데이트
        uses: skills/action-update-step@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          from_step: 2
          to_step: 3

      # Workshop Tracker: 단계 이벤트 전송
      - name: Workshop Tracker 이벤트 전송
        if: always()
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d '{"sessionId": "'"${{ secrets.WORKSHOP_SESSION_ID }}"'", "track": "deploy-to-azure", "eventType": "step", "step": 2, "repository": "'"${{ github.repository }}"'"}' \
            https://workshop-tracker-api.jollyocean-9c92d5de.koreacentral.azurecontainerapps.io/api/events || true
